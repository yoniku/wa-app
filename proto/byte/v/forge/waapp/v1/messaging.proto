syntax = "proto3";

package byte.v.forge.waapp.v1;

import "byte/v/forge/waapp/v1/common.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "ByteVForge.WaApp.V1";
option go_package = "github.com/byte-v-forge/wa-app/gen/go/byte/v/forge/waapp/v1;waappv1";
option java_multiple_files = true;
option java_outer_classname = "WaAppMessagingProto";
option java_package = "com.bytevforge.waapp.v1";
option php_namespace = "ByteVForge\\WaApp\\V1";

service WaMessagingService {
  rpc OpenMessageSession(OpenMessageSessionRequest) returns (OpenMessageSessionResponse);
  rpc GetMessageSession(GetMessageSessionRequest) returns (GetMessageSessionResponse);
  rpc ReceiveMessageBatch(ReceiveMessageBatchRequest) returns (ReceiveMessageBatchResponse);
  rpc GetLongConnectionStatus(GetLongConnectionStatusRequest) returns (GetLongConnectionStatusResponse);
  rpc AcknowledgeMessage(AcknowledgeMessageRequest) returns (AcknowledgeMessageResponse);
  rpc CloseMessageSession(CloseMessageSessionRequest) returns (CloseMessageSessionResponse);
}

enum MessageSessionStatus {
  MESSAGE_SESSION_STATUS_UNSPECIFIED = 0;
  MESSAGE_SESSION_STATUS_OPENING = 1;
  MESSAGE_SESSION_STATUS_OPEN = 2;
  MESSAGE_SESSION_STATUS_DRAINING = 3;
  MESSAGE_SESSION_STATUS_CLOSED = 4;
  MESSAGE_SESSION_STATUS_FAILED = 5;
}

enum InboundMessageKind {
  INBOUND_MESSAGE_KIND_UNSPECIFIED = 0;
  INBOUND_MESSAGE_KIND_MESSAGE = 1;
  INBOUND_MESSAGE_KIND_NOTIFICATION = 2;
  INBOUND_MESSAGE_KIND_RECEIPT = 3;
  INBOUND_MESSAGE_KIND_SYSTEM = 4;
}

enum MessageEncryptionState {
  MESSAGE_ENCRYPTION_STATE_UNSPECIFIED = 0;
  MESSAGE_ENCRYPTION_STATE_PLAINTEXT = 1;
  MESSAGE_ENCRYPTION_STATE_ENCRYPTED = 2;
  MESSAGE_ENCRYPTION_STATE_DECRYPTED = 3;
  MESSAGE_ENCRYPTION_STATE_DECRYPTION_FAILED = 4;
}

enum MessageAckStatus {
  MESSAGE_ACK_STATUS_UNSPECIFIED = 0;
  MESSAGE_ACK_STATUS_NOT_REQUIRED = 1;
  MESSAGE_ACK_STATUS_PENDING = 2;
  MESSAGE_ACK_STATUS_ACKED = 3;
  MESSAGE_ACK_STATUS_FAILED = 4;
}

enum LongConnectionStatus {
  LONG_CONNECTION_STATUS_UNSPECIFIED = 0;
  LONG_CONNECTION_STATUS_STARTING = 1;
  LONG_CONNECTION_STATUS_CONNECTED = 2;
  LONG_CONNECTION_STATUS_HEARTBEAT_WAITING = 3;
  LONG_CONNECTION_STATUS_RECONNECTING = 4;
  LONG_CONNECTION_STATUS_FAILED = 5;
  LONG_CONNECTION_STATUS_STOPPED = 6;
}

message MessageSession {
  string message_session_id = 1;
  string wa_account_id = 2;
  string client_profile_id = 3;
  string registered_identity_id = 4;
  string protocol_profile_id = 5;
  MessageSessionStatus status = 6;
  google.protobuf.Timestamp opened_at = 7;
  google.protobuf.Timestamp last_seen_at = 8;
  google.protobuf.Timestamp closed_at = 9;
  WaError last_error = 10;
}

message InboundMessage {
  string message_id = 1;
  string message_session_id = 2;
  InboundMessageKind kind = 3;
  MessageEncryptionState encryption_state = 4;
  MessageAckStatus ack_status = 5;
  string sender_ref = 6;
  string payload_ref = 7;
  google.protobuf.Timestamp received_at = 8;
  WaError last_error = 9;
}

message LongConnectionState {
  string workspace_id = 1;
  string login_state_id = 2;
  string wa_account_id = 3;
  string client_profile_id = 4;
  string registered_identity_id = 5;
  string message_session_id = 6;
  LongConnectionStatus status = 7;
  bool heartbeat_supported = 8;
  google.protobuf.Timestamp started_at = 9;
  google.protobuf.Timestamp last_connected_at = 10;
  google.protobuf.Timestamp last_heartbeat_at = 11;
  google.protobuf.Timestamp last_message_at = 12;
  int32 reconnect_count = 13;
  WaError last_error = 14;
}

message OpenMessageSessionRequest {
  RequestContext context = 1;
  string wa_account_id = 2;
  string client_profile_id = 3;
  string registered_identity_id = 4;
  string protocol_profile_id = 5;
}

message OpenMessageSessionResponse {
  MessageSession session = 1;
  WaError error = 2;
}

message GetMessageSessionRequest {
  RequestContext context = 1;
  string message_session_id = 2;
}

message GetMessageSessionResponse {
  MessageSession session = 1;
  WaError error = 2;
}

message ReceiveMessageBatchRequest {
  RequestContext context = 1;
  string message_session_id = 2;
  int32 max_messages = 3;
  google.protobuf.Duration wait_timeout = 4;
}

message ReceiveMessageBatchResponse {
  repeated InboundMessage messages = 1;
  MessageSession session = 2;
  WaError error = 3;
}

message GetLongConnectionStatusRequest {
  RequestContext context = 1;
  string login_state_id = 2;
  string wa_account_id = 3;
  string client_profile_id = 4;
  string registered_identity_id = 5;
}

message GetLongConnectionStatusResponse {
  repeated LongConnectionState connections = 1;
  WaError error = 2;
}

message AcknowledgeMessageRequest {
  RequestContext context = 1;
  string message_session_id = 2;
  string message_id = 3;
}

message AcknowledgeMessageResponse {
  InboundMessage message = 1;
  WaError error = 2;
}

message CloseMessageSessionRequest {
  RequestContext context = 1;
  string message_session_id = 2;
  string reason = 3;
}

message CloseMessageSessionResponse {
  MessageSession session = 1;
  WaError error = 2;
}
